name: Print Special Folders

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. Desktop Platforms (Split into 4 explicit runtime contexts)
  desktop-run:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos-latest
            gui: false
          - os: windows-latest
            name: windows-latest
            gui: false
          - os: ubuntu-latest
            name: ubuntu-latest-tty
            gui: false
          - os: ubuntu-latest
            name: ubuntu-latest-gui
            gui: true
    runs-on: ${{ matrix.os }}
    name: desktop-run (${{ matrix.name }})
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Pin .NET SDK to 8.x
      shell: bash
      run: echo '{"sdk":{"version":"8.0.0","rollForward":"latestFeature"}}' > global.json

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Install Xfce package layers exclusively for the Ubuntu GUI runtime block
    - name: Install Xfce and Virtual Display (Ubuntu GUI Only)
      if: matrix.name == 'ubuntu-latest-gui'
      run: |
        sudo apt-get update
        sudo apt-get install -y xfce4 xvfb dbus-x11

    - name: Run App and Capture Logs
      shell: bash
      run: |
        mkdir -p desktop-results
        if [ "${{ matrix.name }}" = "ubuntu-latest-gui" ]; then
          # Start a virtual X-server session, launch dbus, and execute your app inside xfce
          xvfb-run --server-args="-screen 0 1024x768x24" dbus-launch xfce4-session &
          sleep 3
          DISPLAY=:99 dotnet run --project desktop.csproj | tee desktop-results/${{ matrix.name }}.log
        else
          # Standard launch path for Windows, macOS, and raw Ubuntu TTY
          dotnet run --project desktop.csproj | tee desktop-results/${{ matrix.name }}.log
        fi

    - name: Upload Desktop Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: desktop-logs-${{ matrix.name }}
        path: desktop-results/

  # 2. Android Mobile Run
  android-mobile-run:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Isolate Project Context & Pin SDK
      run: |
        rm desktop.csproj ios.csproj specialdirs.csproj 2>/dev/null || true
        echo '{"sdk":{"version":"8.0.0","rollForward":"latestFeature"}}' > global.json
        echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.ahenyao.specialdirs"><application android:label="specialdirs" /></manifest>' > AndroidManifest.xml

    - name: Enable KVM group permissions
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install .NET Android Workload
      run: dotnet workload restore

    - name: Inject Native Android Launcher Entry
      run: |
        mkdir -p Properties
        cat << 'EOF' > Properties/AndroidLauncher.cs
        using Android.App;
        using Android.OS;
        using System;
        using System.Reflection;

        namespace AndroidAutoLauncher
        {
            [Activity(Label = "SpecialDirs", MainLauncher = true, Exported = true)]
            public class MainActivity : Activity
            {
                protected override void OnCreate(Bundle? savedInstanceState)
                {
                    base.OnCreate(savedInstanceState);
                    Console.WriteLine("====== STARTING APP EXECUTION ======");
                    try
                    {
                        // Look for a class named "Program" anywhere in the compiled assembly
                        Type programType = Type.GetType("Program") ?? Type.GetType("SpecialDirs.Program");
                        
                        if (programType != null)
                        {
                            // Target Main regardless of whether it is public, private, or internal
                            MethodInfo mainMethod = programType.GetMethod("Main", BindingFlags.Public | BindingFlags.NonPublic | BindingFlags.Static);
                            
                            if (mainMethod != null)
                            {
                                var parameters = mainMethod.GetParameters().Length > 0 ? new object[] { Array.Empty<string>() } : null;
                                mainMethod.Invoke(null, parameters);
                            }
                            else
                            {
                                Console.WriteLine("Error: Could not locate a valid Main() method inside Program class.");
                            }
                        }
                        else
                        {
                            Console.WriteLine("Error: Could not locate a target Program class.");
                        }
                    }
                    catch (Exception ex)
                    {
                        Console.WriteLine("Error executing main loop: " + ex.ToString());
                    }
                    Console.WriteLine("====== END APP EXECUTION ======");
                    System.Environment.Exit(0);
                }
            }
        }
        EOF

    - name: Run on Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        target: google_apis
        script: |
          dotnet build android.csproj -c Release
          adb install bin/Release/net8.0-android/*-Signed.apk
          adb logcat -c
          adb shell monkey -p com.ahenyao.specialdirs -c android.intent.category.LAUNCHER 1
          sleep 5
          
          # Initialize working space directory for logging output artifacts
          mkdir -p android-results
          adb logcat -d > android-results/android-logcat.txt

    - name: Upload Android Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: android-logs
        path: android-results/

  # 3. iOS Mobile Run
  ios-mobile-run:
    runs-on: macos-15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Isolate Project Context & Pin SDK
      run: |
        rm desktop.csproj android.csproj specialdirs.csproj 2>/dev/null || true
        echo '{"sdk":{"version":"8.0.0","rollForward":"latestFeature"}}' > global.json

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install .NET iOS Workload
      run: |
        dotnet workload restore
        dotnet tool install Microsoft.DotNet.XHarness.CLI --global --add-source "https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" --version "11.0.0-prerelease*"

    - name: Run on iOS Simulator
      run: |
        dotnet build ios.csproj -c Release -r iossimulator-x64
        
        xharness apple run --app="bin/Release/net8.0-ios/iossimulator-x64/ios.app" --targets="ios-simulator-64" --output-directory="ios-results"

    - name: Upload iOS Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ios-logs
        path: ios-results/