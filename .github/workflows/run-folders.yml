name: Print Special Folders

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. Desktop Platforms (Windows, macOS, Linux)
  desktop-run:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Run App
      run: dotnet run --project specialdirs.csproj

  # 2. Android Emulator Run (Executed on Ubuntu with native KVM hardware acceleration)
  android-mobile-run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install .NET Android Workload
      run: |
        dotnet workload install android
        
        # Installs the official XHarness CLI using the public dotnet-eng feed
        dotnet tool install Microsoft.DotNet.XHarness.CLI \
          --global \
          --add-source "https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" \
          --version "11.0.0-prerelease*"

    - name: Run on Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64 # Linux runners use standard x86_64 architecture
        target: google_apis
        script: |
          dotnet build specialdirs.csproj -c Release -f net9.0-android /p:MobileBuild=true
          xharness android run \
            --app="bin/Release/net9.0-android/specialdirs.apk" \
            --package-name="com.ahenyao.specialdirs" \
            --output-directory="android-results"

  # 3. iOS Simulator Run (Executed on macOS)
  ios-mobile-run:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install .NET iOS Workload
      run: |
        dotnet workload install ios
        
        # Installs the official XHarness CLI using the public dotnet-eng feed
        dotnet tool install Microsoft.DotNet.XHarness.CLI \
          --global \
          --add-source "https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" \
          --version "11.0.0-prerelease*"

    - name: Run on iOS Simulator
      run: |
        dotnet build specialdirs.csproj -c Release -f net9.0-ios -r iossimulator-x64 /p:MobileBuild=true
        xharness apple run \
          --app="bin/Release/net9.0-ios/iossimulator-x64/specialdirs.app" \
          --targets="ios-simulator-64" \
          --output-directory="ios-results"