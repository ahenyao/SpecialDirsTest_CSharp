name: Print Special Folders

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. Desktop Platforms (Windows, macOS, Linux)
  desktop-run:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Run App
      # No extra work needed here; it will default to net9.0 and run smoothly
      run: dotnet run --project specialdirs.csproj

  # 2. Mobile Platforms (Android & iOS)
  mobile-run:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install .NET iOS and Android Workloads
      run: |
        dotnet workload install ios android
        # Install the tool with explicit source and allowing prerelease versions if necessary
        dotnet tool install --global Microsoft.DotNet.XHarness.CLI --version "9.0.0-*" --add-source https://pkgs.dev.azure.com/dnceng/public/_nuget/v3/index.json || dotnet tool install --global Microsoft.DotNet.XHarness.CLI

    # Android Run
    - name: Run on Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        target: google_apis
        script: |
          # We pass /p:MobileBuild=true to activate the android target framework
          dotnet build specialdirs.csproj -c Release -f net9.0-android /p:MobileBuild=true
          xharness android run \
            --app="bin/Release/net9.0-android/specialdirs.apk" \
            --package-name="com.ahenyao.specialdirs" \
            --output-directory="android-results"

    # iOS Run
    - name: Run on iOS Simulator
      run: |
        # We pass /p:MobileBuild=true to activate the ios target framework
        dotnet build specialdirs.csproj -c Release -f net9.0-ios -r iossimulator-x64 /p:MobileBuild=true
        xharness apple run \
          --app="bin/Release/net9.0-ios/iossimulator-x64/specialdirs.app" \
          --targets="ios-simulator-64" \
          --output-directory="ios-results"