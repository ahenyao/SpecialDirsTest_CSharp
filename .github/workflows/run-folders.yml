name: Print Special Folders

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. Desktop Platforms (Windows, macOS, Linux)
  desktop-run:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Run App
      run: dotnet run --project specialdirs.csproj

  # 2. Android Mobile Run (Fixed: using macos-14 with native ARM64 emulator)
  android-mobile-run:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install .NET Android Workload
      run: |
        dotnet workload install android
        dotnet tool install Microsoft.DotNet.XHarness.CLI \
          --global \
          --add-source "https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" \
          --version "11.0.0-prerelease*"

    - name: Run on Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: arm64-v8a # Crucial: Matches the Apple Silicon host natively
        target: google_apis
        script: |
          # /p:CheckEolTargetFramework=false bypasses the NETSDK1202 support warning
          dotnet build specialdirs.csproj -c Release /p:TargetAndroid=true /p:CheckEolTargetFramework=false
          xharness android run \
            --app="bin/Release/net8.0-android/specialdirs.apk" \
            --package-name="com.ahenyao.specialdirs" \
            --output-directory="android-results"

  # 3. iOS Mobile Run (Fixed: Bypassing the EOL warning)
  ios-mobile-run:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install .NET iOS Workload
      run: |
        dotnet workload install ios
        dotnet tool install Microsoft.DotNet.XHarness.CLI \
          --global \
          --add-source "https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json" \
          --version "11.0.0-prerelease*"

    - name: Run on iOS Simulator
      run: |
        # /p:CheckEolTargetFramework=false bypasses the NETSDK1202 support warning
        dotnet build specialdirs.csproj -c Release -r iossimulator-x64 /p:TargetiOS=true /p:CheckEolTargetFramework=false
        xharness apple run \
          --app="bin/Release/net8.0-ios/iossimulator-x64/specialdirs.app" \
          --targets="ios-simulator-64" \
          --output-directory="ios-results"