name: Print Special Folders

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. Desktop Platforms (Windows, macOS, Linux)
  desktop-run:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Run App
      # Added "--framework net9.0" to resolve the multi-targeting ambiguity
      run: dotnet run --project specialdirs.csproj --framework net9.0

  # 2. Mobile Platforms (Android & iOS)
  mobile-run:
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install .NET iOS and Android Workloads
      run: |
        dotnet workload install ios android
        dotnet tool install --global Microsoft.DotNet.XHarness.CLI

    # Android Run
    - name: Run on Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        target: google_apis
        script: |
          dotnet build specialdirs.csproj -c Release -f net9.0-android
          xharness android run \
            --app="bin/Release/net9.0-android/test.apk" \
            --package-name="com.ahenyao.specialdirs" \
            --output-directory="android-results"

    # iOS Run
    - name: Run on iOS Simulator
      run: |
        dotnet build specialdirs.csproj -c Release -f net9.0-ios -r iossimulator-x64
        xharness apple run \
          --app="bin/Release/net9.0-ios/iossimulator-x64/test.app" \
          --targets="ios-simulator-64" \
          --output-directory="ios-results"